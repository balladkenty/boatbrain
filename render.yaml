services:
  - type: web
    name: boatbrain
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID_STD
        sync: false
      - key: STRIPE_PRICE_ID_PRE
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: MODEL_PATH
        value: /opt/render/project/src/kyotei_model_v5.pkl
      - key: PORT
        value: 8000
    disk:
      name: boatbrain-data
      mountPath: /opt/render/project/src/data
      sizeGB: 10
