<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOAT BRAIN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root {
  --ink:   #04070d;
  --deep:  #0b1420;
  --hull:  #132030;
  --rail:  #1c3048;
  --mist:  #556a88;
  --sky:   #2878f0;
  --foam:  #55aaff;
  --wake:  #00d4b8;
  --go:    #00cc66;
  --warn:  #ff9900;
  --stop:  #ff3355;
  --gold:  #ffd000;
  --w:     #dde8ff;
  --mono:  'JetBrains Mono', monospace;
  --sans:  'Noto Sans JP', sans-serif;
  --rim:   rgba(40,120,240,0.14);
  --glass: rgba(255,255,255,0.025);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--ink);color:var(--w);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 40% at 50% 100%,rgba(40,120,240,0.06) 0%,transparent 60%)}

nav{position:sticky;top:0;z-index:200;height:48px;
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;
  background:rgba(4,7,13,.96);backdrop-filter:blur(18px);border-bottom:1px solid var(--rim)}
.logo{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.15em;color:var(--foam)}
.logo b{color:var(--wake);font-weight:700}
.live{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--go);letter-spacing:.1em}
.dot{width:5px;height:5px;border-radius:50%;background:var(--go);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.app{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:18px 14px 80px}

/* SELECTOR */
.sel-card{background:var(--glass);border:1px solid var(--rim);border-radius:8px;padding:16px 18px;margin-bottom:12px}
.sel-row{display:grid;grid-template-columns:1fr 68px 68px 68px;gap:9px}
@media(max-width:500px){.sel-row{grid-template-columns:1fr 1fr}}
.sel-g label{display:block;font-size:9px;color:var(--mist);margin-bottom:4px;letter-spacing:.06em}
select,input[type=number]{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--rim);color:var(--w);padding:8px 9px;border-radius:4px;font-family:var(--sans);font-size:13px;outline:none;appearance:none;transition:border-color .15s}
select:focus,input:focus{border-color:var(--sky)}
.btn-fetch{width:100%;background:var(--hull);border:1px solid var(--rim);color:var(--foam);padding:11px;border-radius:4px;font-family:var(--sans);font-size:13px;font-weight:700;letter-spacing:.08em;cursor:pointer;transition:all .15s;margin-bottom:12px}
.btn-fetch:hover{background:var(--rail);border-color:var(--sky)}
.btn-fetch:disabled{opacity:.3;cursor:not-allowed}

/* ── REASON CARD（核心差別化） ── */
.reason-card{border-radius:10px;padding:0;margin-bottom:14px;display:none;overflow:hidden}
.reason-card.show{display:block}
.reason-head{padding:16px 20px 14px;display:flex;align-items:flex-start;gap:14px}
.reason-icon{font-size:30px;flex-shrink:0;margin-top:2px}
.reason-meta{}
.reason-type{font-family:var(--mono);font-size:9px;letter-spacing:.16em;margin-bottom:5px}
.reason-verdict{font-size:18px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:6px}
.reason-oneline{font-size:12px;line-height:1.65}

/* 根拠リスト */
.why-list{padding:0 20px 16px;display:flex;flex-direction:column;gap:6px}
.why-item{
  display:flex;align-items:flex-start;gap:9px;
  padding:9px 12px;border-radius:5px;
  background:rgba(255,255,255,.03);
}
.why-key{font-family:var(--mono);font-size:9px;letter-spacing:.08em;padding:2px 6px;border-radius:2px;flex-shrink:0;margin-top:1px}
.why-key.pos{background:rgba(0,204,102,.12);color:var(--go);border:1px solid rgba(0,204,102,.2)}
.why-key.neg{background:rgba(255,51,85,.1);color:var(--stop);border:1px solid rgba(255,51,85,.2)}
.why-key.neu{background:rgba(255,255,255,.06);color:var(--mist)}
.why-val{font-size:12px;line-height:1.6;color:var(--w)}
.why-val b{color:#fff}

/* カラー by type */
.reason-card.go{background:rgba(0,204,102,.05);border:1px solid rgba(0,204,102,.2)}
.reason-card.go .reason-type{color:var(--go)}
.reason-card.warn{background:rgba(255,153,0,.05);border:1px solid rgba(255,153,0,.2)}
.reason-card.warn .reason-type{color:var(--warn)}
.reason-card.stop{background:rgba(255,51,85,.04);border:1px solid rgba(255,51,85,.15)}
.reason-card.stop .reason-type{color:var(--stop)}

/* 荒れ主体カード */
.upset-who{border-radius:8px;padding:16px 18px;margin-bottom:12px;display:none}
.upset-who.show{display:block}
.upset-who.active{background:rgba(255,153,0,.05);border:1px solid rgba(255,153,0,.2)}
.upset-who.low{background:var(--glass);border:1px solid var(--rim)}
.uw-title{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--warn);margin-bottom:12px}
.uw-list{display:flex;flex-direction:column;gap:8px}
.uw-row{
  display:grid;grid-template-columns:32px 1fr auto;gap:10px;align-items:center;
  padding:10px 12px;border-radius:5px;background:rgba(255,255,255,.03);
  border-left:3px solid var(--warn);
}
.uw-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px}
.uw-body{}
.uw-name{font-size:12px;font-weight:700;margin-bottom:2px}
.uw-why{font-size:11px;color:var(--mist);line-height:1.6}
.uw-role{
  font-family:var(--mono);font-size:9px;font-weight:700;
  padding:3px 8px;border-radius:2px;white-space:nowrap;
  background:rgba(255,153,0,.15);color:var(--warn);
  border:1px solid rgba(255,153,0,.25);
}

/* 出走表 */
.race-card{background:var(--glass);border:1px solid var(--rim);border-radius:8px;display:none;margin-bottom:12px;overflow:hidden}
.race-card.show{display:block}
.rc-head{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:rgba(12,20,48,.5);border-bottom:1px solid var(--rim)}
.rc-title{font-size:13px;font-weight:700}
.chips{display:flex;gap:5px}
.chip{font-family:var(--mono);font-size:8px;letter-spacing:.1em;padding:2px 6px;border-radius:2px}
.chip-on{background:rgba(0,204,102,.1);color:var(--go);border:1px solid rgba(0,204,102,.2)}
.chip-off{background:rgba(255,255,255,.05);color:var(--mist)}

.boat-hd{display:grid;grid-template-columns:30px 1fr 46px 46px 46px 52px 58px;gap:5px;padding:5px 14px;border-bottom:1px solid var(--rim)}
.bh{font-family:var(--mono);font-size:8px;color:var(--mist);letter-spacing:.07em;text-align:center}
.bh:nth-child(2){text-align:left}
.boat-r{display:grid;grid-template-columns:30px 1fr 46px 46px 46px 52px 58px;gap:5px;align-items:center;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.03);border-left:3px solid transparent}
.boat-r:last-child{border-bottom:none}
.boat-r.hi{border-left-color:var(--wake)}
.boat-r.warn-f{border-left-color:var(--stop)}
.boat-r.upset-f{border-left-color:var(--warn)}
.nb{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;flex-shrink:0}
.bi .bn{font-size:12px;font-weight:700;line-height:1.2}
.bi .bs{font-family:var(--mono);font-size:9px;color:var(--mist);margin-top:1px}
.ftag{font-size:8px;font-weight:700;background:var(--stop);color:#fff;padding:1px 4px;border-radius:2px;margin-left:3px}
.utag{font-size:8px;font-weight:700;background:var(--warn);color:#111;padding:1px 4px;border-radius:2px;margin-left:3px}
.cv{font-family:var(--mono);font-size:11px;text-align:center}
.cv.hi{color:var(--wake);font-weight:700}
.cv.live{color:var(--foam)}
.cv.odhi{color:var(--gold);font-weight:700}
.cv.odlo{color:var(--mist)}

/* predict btn */
.pred-wrap{text-align:center;margin:16px 0}
.btn-pred{background:linear-gradient(135deg,#0a3580,var(--sky));border:none;border-radius:4px;color:#fff;padding:13px 48px;font-family:var(--sans);font-size:14px;font-weight:900;letter-spacing:.1em;cursor:pointer;box-shadow:0 0 32px rgba(40,120,240,.2);transition:all .2s;display:none}
.btn-pred.show{display:inline-block}
.btn-pred:hover{transform:translateY(-1px);box-shadow:0 4px 40px rgba(40,120,240,.35)}

.loading{display:none;text-align:center;padding:32px}
.spin{width:32px;height:32px;margin:0 auto 12px;border:2px solid var(--rim);border-top-color:var(--foam);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--mist);font-size:11px}

/* RESULT */
#result{display:none}

/* 確率 */
.prob-wrap{background:var(--glass);border:1px solid var(--rim);border-radius:8px;padding:16px;margin-bottom:12px}
.slbl{font-family:var(--mono);font-size:9px;letter-spacing:.16em;color:var(--mist);text-transform:uppercase;margin-bottom:12px}
.prob-r{display:grid;grid-template-columns:26px 1fr 54px 1fr 50px;gap:7px;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.prob-r:last-child{border-bottom:none}
.mk{font-size:12px;font-weight:900;color:var(--gold)}
.pn{font-size:12px;font-weight:700}
.pg{font-family:var(--mono);font-size:9px;color:var(--mist)}
.bw{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.bf{height:100%;border-radius:2px;transition:width .7s ease}
.pp{font-family:var(--mono);font-size:13px;font-weight:700;text-align:right}

/* ROI */
.roi-wrap{background:var(--glass);border:1px solid var(--rim);border-radius:8px;padding:16px;margin-bottom:12px}
.roi-g{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:460px){.roi-g{grid-template-columns:1fr}}
.roi-b{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:6px;padding:12px}
.rl{font-family:var(--mono);font-size:8px;color:var(--mist);letter-spacing:.1em;margin-bottom:5px}
.rv{font-family:var(--mono);font-size:20px;font-weight:700}
.rs{font-size:10px;color:var(--mist);margin-top:3px}
.rp{color:var(--go)!important} .rm{color:var(--stop)!important}

/* EV */
.ev-r{display:grid;grid-template-columns:1fr 52px 50px 68px;gap:7px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.ev-r:last-child{border-bottom:none}
.el{font-size:13px;font-weight:700} .et{font-family:var(--mono);font-size:9px;color:var(--mist);margin-top:1px}
.eo{font-family:var(--mono);font-size:12px;color:var(--foam);text-align:right}
.es{font-family:var(--mono);font-size:12px;font-weight:700;text-align:right}
.esp{color:var(--go)} .esw{color:var(--warn)} .esn{color:var(--mist)}
.ea{font-size:10px;font-weight:900;padding:4px 7px;border-radius:2px;text-align:center;white-space:nowrap;background:var(--go);color:var(--ink)}
.ea.w{background:var(--warn);color:#111} .ea.n{background:rgba(255,255,255,.07);color:var(--mist)}

/* タイムライン */
.timeline{background:var(--glass);border:1px solid var(--rim);border-radius:8px;padding:16px;margin-bottom:12px}
.tl-row{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03);align-items:flex-start}
.tl-row:last-child{border-bottom:none}
.tl-time{font-family:var(--mono);font-size:9px;color:var(--mist);min-width:52px;padding-top:1px}
.tl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.tl-dot.go{background:var(--go)} .tl-dot.warn{background:var(--warn)} .tl-dot.sky{background:var(--foam)}
.tl-body{font-size:12px;line-height:1.6;flex:1}
.tl-body b{color:#fff}
.tl-changed{font-family:var(--mono);font-size:10px;color:var(--warn);margin-left:6px}

/* 基本買い目 */
.bets-g{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
@media(max-width:460px){.bets-g{grid-template-columns:1fr}}
.bet-b{background:var(--glass);border:1px solid var(--rim);border-radius:6px;padding:13px}
.btl{font-family:var(--mono);font-size:8px;color:var(--mist);letter-spacing:.1em;margin-bottom:7px}
.bc{font-size:21px;font-weight:900;letter-spacing:.04em}
.bo{font-family:var(--mono);font-size:11px;color:var(--foam);margin-top:4px}
.be{font-family:var(--mono);font-size:10px;margin-top:2px}

/* 会場精度 */
.acc-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-family:var(--mono);font-size:9px;letter-spacing:.06em;
  padding:3px 8px;border-radius:2px;
}
.acc-hi{background:rgba(0,204,102,.1);color:var(--go);border:1px solid rgba(0,204,102,.2)}
.acc-lo{background:rgba(255,51,85,.08);color:var(--stop);border:1px solid rgba(255,51,85,.15)}
.acc-md{background:rgba(255,255,255,.06);color:var(--mist)}

/* roi history */
.roi-hist{background:var(--glass);border:1px solid var(--rim);border-radius:8px;padding:16px;margin-bottom:12px;display:none}
.hi-r{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:11px}
.hi-r:last-child{border-bottom:none}
.hi-hit{color:var(--go)} .hi-miss{color:var(--mist)}
.roi-sum{display:flex;gap:14px;margin-top:10px;font-family:var(--mono);font-size:11px}

.toast{position:fixed;bottom:18px;right:14px;z-index:999;background:var(--rail);border:1px solid var(--rim);color:var(--w);font-size:11px;padding:8px 14px;border-radius:4px;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
footer{position:relative;z-index:1;text-align:center;padding:24px 14px;border-top:1px solid var(--rim);margin-top:60px;color:var(--mist);font-size:10px;line-height:1.8}
</style>
</head>
<body>

<nav>
  <div class="logo">BOAT<b>BRAIN</b></div>
  <div class="live"><span class="dot"></span><span id="nt">--:--</span></div>
</nav>

<div class="app">

  <!-- セレクター -->
  <div class="sel-card">
    <div class="sel-row">
      <div class="sel-g">
        <label>会場</label>
        <select id="sv">
          <option value="24">大村</option><option value="1">桐生</option><option value="2">戸田</option>
          <option value="3">江戸川</option><option value="4">平和島</option><option value="5">多摩川</option>
          <option value="6">浜名湖</option><option value="7">蒲郡</option><option value="8">常滑</option>
          <option value="9">津</option><option value="10">三国</option><option value="11">びわこ</option>
          <option value="12">住之江</option><option value="13">尼崎</option><option value="14">鳴門</option>
          <option value="15">丸亀</option><option value="16">児島</option><option value="17">宮島</option>
          <option value="18">徳山</option><option value="19">下関</option><option value="20">若松</option>
          <option value="21">芦屋</option><option value="22">福岡</option><option value="23">唐津</option>
        </select>
      </div>
      <div class="sel-g"><label>R</label>
        <select id="sr">
          <option>1</option><option>2</option><option>3</option><option>4</option>
          <option>5</option><option>6</option><option>7</option><option>8</option>
          <option>9</option><option>10</option><option>11</option><option>12</option>
        </select>
      </div>
      <div class="sel-g"><label>風速m</label><input type="number" id="iw" value="2" min="0" max="20"></div>
      <div class="sel-g"><label>波高cm</label><input type="number" id="iv" value="2" min="0" max="50"></div>
    </div>
  </div>

  <button class="btn-fetch" id="bf" onclick="fetchAll()">出走表・展示・オッズを取得する</button>

  <!-- ★ 核心：AIの判断理由カード -->
  <div class="reason-card" id="rc">
    <div class="reason-head">
      <div class="reason-icon" id="ri">🟢</div>
      <div>
        <div class="reason-type" id="rt">RACE TYPE</div>
        <div class="reason-verdict" id="rv2">—</div>
        <div class="reason-oneline" id="ro"></div>
      </div>
    </div>
    <div class="why-list" id="wl"></div>
  </div>

  <!-- 荒れの主体は誰か -->
  <div class="upset-who" id="uw">
    <div class="uw-title">▶ 荒れ因子の主体</div>
    <div class="uw-list" id="uwl"></div>
  </div>

  <!-- 出走表 -->
  <div class="race-card" id="rcard">
    <div class="rc-head">
      <div class="rc-title" id="rctitle">—</div>
      <div class="chips" id="chips"></div>
    </div>
    <div class="boat-hd">
      <div></div><div class="bh" style="text-align:left">選手</div>
      <div class="bh">全国勝率</div><div class="bh">展示ST</div>
      <div class="bh">展示T</div><div class="bh">当地適性</div>
      <div class="bh">単勝</div>
    </div>
    <div id="brows"></div>
  </div>

  <div class="pred-wrap">
    <button class="btn-pred" id="bp" onclick="predict()">AI予測を実行する</button>
  </div>

  <div class="loading" id="ld">
    <div class="spin"></div><p id="lm">取得中...</p>
  </div>

  <div id="result">

    <!-- 確率 -->
    <div class="prob-wrap">
      <div class="slbl">AI予測確率</div>
      <div id="prows"></div>
    </div>

    <!-- 回収率・EV -->
    <div class="roi-wrap">
      <div class="slbl">回収率・期待値</div>
      <div class="roi-g" id="roig"></div>
      <div class="slbl" style="margin-top:14px">EV推奨買い目</div>
      <div id="evrows"></div>
    </div>

    <!-- 予想変化タイムライン（差別化の核心） -->
    <div class="timeline" id="tl-card">
      <div class="slbl">AIの判断タイムライン</div>
      <div id="tlrows"></div>
    </div>

    <!-- 基本買い目 -->
    <div class="slbl" style="margin:0 0 9px">推奨買い目</div>
    <div class="bets-g" id="betsg"></div>

    <!-- 回収率履歴 -->
    <div class="roi-hist" id="rh">
      <div class="slbl">本日の収支記録</div>
      <div id="rhrows"></div>
      <div class="roi-sum">
        <span>投資: <b id="ti">0</b>円</span>
        <span>回収: <b id="tr">0</b>円</span>
        <span>ROI: <b id="troi" style="color:var(--go)">—</b></span>
      </div>
    </div>
  </div>
</div>

<footer>BOAT BRAIN — AI競艇情報ツール<br>
<span style="opacity:.5">予想は参考情報です。投票は20歳以上・自己責任でお願いします。</span></footer>
<div class="toast" id="toast"></div>

<script>
const API='http://localhost:8000';
const VENUE_ADV={"大村":.671,"住之江":.598,"尼崎":.590,"徳山":.582,"下関":.578,"常滑":.573,"蒲郡":.571,"唐津":.570,"芦屋":.565,"若松":.562,"福岡":.559,"宮島":.554,"多摩川":.549,"桐生":.545,"鳴門":.540,"丸亀":.538,"平和島":.535,"浜名湖":.530,"三国":.528,"児島":.525,"津":.520,"びわこ":.515,"戸田":.480,"江戸川":.455};

function getMetrics(){
  const vn=CV[jcd]||'大村';
  const inAdv=VENUE_ADV[vn]||.54;
  const tansho=odds?.tansho||odds?.odds?.tansho||{};
  const stVals=boats.map(b=>{const bi=before[b.boat]||before[String(b.boat)]||{};return bi.exh_st??b.avg_st??0.17});
  const exhVals=boats.map(b=>{const bi=before[b.boat]||before[String(b.boat)]||{};return bi.exh_time??6.85});
  const minST=Math.min(...stVals);
  const b1=boats[0]||{};
  const b1st=stVals[0]??0.17;
  const b1wr=b1.national_win??5;
  const rivalMaxWr=Math.max(...boats.slice(1).map(b=>b.national_win??5));
  const c1StDis=Math.max(0,b1st-minST);
  const c1WrDis=Math.max(0,rivalMaxWr-b1wr);
  const upsetScore=Math.min(1,c1StDis/0.3*0.5+c1WrDis/3*0.5);
  const b1f=(b1.f_count||0)>0;
  const hasBefore=Object.values(before).some(b=>b&&b.exh_time);
  const hasOdds=Object.values(tansho).some(v=>v>0);
  const accRaw=VENUE_ACC[vn]||.69;
  return{vn,inAdv,stVals,exhVals,minST,b1,b1st,b1wr,rivalMaxWr,c1StDis,c1WrDis,upsetScore,b1f,hasBefore,hasOdds,tansho,accRaw};
}

      {k:'会場精度',t:'neu',v:`${vn}でのAI的中率は過去データで<b>${acc}%</b>。${acc>=70?'精度の高い会場です。':'この会場は予測が難しい傾向があります。'}`},

// ── 荒れ主体の特定 ─────────────────────────────────────────
function renderUpsetWho(m){
  const {upsetScore,stVals,exhVals,minST,b1st,b1wr}=m;
  const uw=document.getElementById('uw');
  if(upsetScore<0.25){uw.className='upset-who';return}

  const factors=[];
  boats.forEach((b,i)=>{
    if(b.boat===1)return;
    const st=stVals[i];
    const exht=exhVals[i];
    const wr=b.national_win??5;
    const c=b.boat;
    let roles=[];
    // 差し判定（2コース・STが速い）
    if(c===2&&st<b1st){
      roles.push({role:'差し軸',why:`2コースでST${st.toFixed(2)}（1号艇${b1st.toFixed(2)}より速い）。1号艇が遅れた場合、差しが決まる最有力候補。`});
    }
    // まくり判定（3〜4コース・ST最速クラス）
    if([3,4].includes(c)&&st<=minST+0.02){
      roles.push({role:'まくり軸',why:`${c}コースでST${st.toFixed(2)}がレース最速クラス。まくりで外から一気に決める可能性がある。`});
    }
    // まくり差し判定（3〜5コース・勝率上位）
    if([3,4,5].includes(c)&&wr>=5.5&&st<b1st+0.03){
      roles.push({role:'まくり差し',why:`${c}コース・勝率${wr.toFixed(2)}の実力者。1号艇が崩れた隙間に差し込むまくり差しが決まりやすい。`});
    }
    if(roles.length>0){
      factors.push({boat:b,st,wr,roles});
    }
  });

  if(factors.length===0){
    uw.className='upset-who show low';
    document.getElementById('uwl').innerHTML='<div style="color:var(--mist);font-size:12px;padding:6px 0">展示情報確定後に荒れ主体を特定します。</div>';
    return;
  }

  uw.className='upset-who show active';
  document.getElementById('uwl').innerHTML=factors.map(f=>{
    const b=f.boat;
    const role=f.roles[0];
    return`<div class="uw-row">
      <div class="uw-badge" style="background:${BG[b.boat-1]};color:${BT[b.boat-1]}">${b.boat}</div>
      <div class="uw-body">
        <div class="uw-name">${b.name} <span style="font-size:10px;color:var(--mist);font-family:var(--mono)">${b.grade} 勝率${(b.national_win||0).toFixed(2)}</span></div>
        <div class="uw-why">${role.why}</div>
      </div>
      <div class="uw-role">${role.role}</div>
    </div>`;
  }).join('');
}

  const rows=boats.map((b,i)=>{
    const bi=before[b.boat]||before[String(b.boat)]||{};
    const st=bi.exh_st; const exht=bi.exh_time;
    const isF=b.f_count>0;
    const isBestST=st!=null&&Math.abs(st-minST)<0.005;
    const isBestExh=exht!=null&&Math.abs(exht-minExh)<0.005;
    const o=tansho[b.boat]||tansho[String(b.boat)];
    const va=b.venue_win_rate??0.17;

    return`<div class="boat-r ${cls}">
      <div class="nb" style="background:${BG[i]};color:${BT[i]}">${b.boat}</div>
      <div class="bi">
        <div class="bn">${b.name}${isF?`<span class="ftag">F${b.f_count}</span>`:''}${isUF&&upsetScore>=0.4?'<span class="utag">荒れ因子</span>':''}</div>
        <div class="bs">${b.grade} / 節内:${sess}</div>
      </div>
      <div class="cv">${(b.national_win||0).toFixed(2)}</div>
      <div class="cv ${st!=null?(isBestST?'hi':'live'):''}">
        ${st!=null?(bi.exh_st_f?`<span style="color:var(--stop)">F.${String(Math.round(st*100)).padStart(2,'0')}</span>`:`.${String(Math.round(st*100)).padStart(2,'0')}`):'—'}</div>
      <div class="cv ${exht!=null?(isBestExh?'hi':'live'):''}">

      <div class="cv ${o&&o>0?o<3?'odlo':o>8?'odhi':'live':'odlo'}">
        ${o&&o>0?o.toFixed(1)+'倍':'—'}</div>

  }).join('');
  document.getElementById('brows').innerHTML=rows;
  document.getElementById('rcard').classList.add('show');

// ── AI予測 ─────────────────────────────────────────────────
function computeProbs(){
  const m=getMetrics();
  const {inAdv,stVals,exhVals,minST,upsetScore,tansho}=m;
  const exhMean=exhVals.reduce((a,x)=>a+x)/6;
  const rawImpl={};
  Object.entries(tansho).forEach(([b,o])=>{if(o>0)rawImpl[parseInt(b)]=1/(o*TTAX)});
  const impSum=Object.values(rawImpl).reduce((a,b)=>a+b)||1;
  const impl={};boats.forEach(b=>{impl[b.boat]=rawImpl[b.boat]?rawImpl[b.boat]/impSum:1/6});

  return boats.map((b,i)=>{
    const c=b.boat;
    const wr=b.national_win??5;
    const g={A1:4,A2:3,B1:2,B2:1}[b.grade]||2;
    const adjST=stVals[i]+((b.f_count||0)*0.054);
    const exhRel=exhMean-exhVals[i];
    const sessWR=b.session_results?.filter(f=>f===1).length/(b.session_results?.length||1)||0.17;
    const va=b.venue_win_rate??0.17;
    const imp=impl[c]??1/6;
    const inner=c>1?stVals[c-2]??0.17:0;
    const innerDis=c>1?Math.max(0,inner-stVals[i]):0;
    const mksBonus=[3,4,5].includes(c)?upsetScore*(4-Math.min(3,i+1))*0.3:0;
    const wind=parseFloat(document.getElementById('iw').value)||2;
    const wave=parseFloat(document.getElementById('iv').value)||2;
    return inAdv*(7-c)*(wr*0.35+g*0.25+imp*3*0.15+sessWR*2*0.1+va*3*0.15)
      -adjST*5+exhRel*2+imp*2.5+mksBonus+innerDis*3-(wind*wave*.003);
  }).map((s,_,arr)=>{const max=Math.max(...arr);return Math.exp(s-max)})
    .map((e,_,arr)=>e/arr.reduce((a,b)=>a+b));
}

    const top3=sorted.slice(0,3).map(b=>b.boat);

    else{rtype='B 手堅い';rcolor='var(--foam)';rstrat='2連単・3連複中心'}

    const acc=Math.round(accRaw*100);

      <div class="roi-b">

        <div class="rs">${rstrat}</div>

        <div class="rl">単勝回収率（推定）</div>
        <div class="rv ${estROI?estROI>=1?'rp':'rm':''}">${estROI?Math.round(estROI*100)+'%':'未確定'}</div>
        <div class="rs">${topO?`${topO.toFixed(1)}倍 × 確率${(topP*100).toFixed(0)}%`:'オッズ確定後に計算'}</div>
      </div>
      <div class="roi-b">
        <div class="rl">この会場のAI精度</div>
        <div class="rv"><span class="acc-badge ${accCls}">${vn} ${acc}%</span></div>
        <div class="rs">${acc>=70?'得意な会場':acc<60?'苦手な会場（注意）':'標準的な精度'}</div>
      </div>`;

    // EV計算
    const bets=[];
    if(hasOdds){
      boats.forEach((b,i)=>{
        const o=parseFloat(tansho[b.boat]||tansho[String(b.boat)]||0);
        if(!o||o<=0)return;
        const ev=probs[i]*o*TTAX;
        const k=Math.max(0,(probs[i]*o-1)/(o-1))*KL;
        bets.push({type:'単勝',label:`${b.boat}号艇 ${b.name}`,combo:[b.boat],odds:o,ev,kelly:k});
      });
      for(const a of top3)for(const b_ of top3){
        if(a===b_)continue;
        const o=parseFloat(r2t[[a,b_]]||r2t[`${a},${b_}`]||0);
        if(!o)continue;
        const pa=pm[a],pb=pm[b_];
        const p2=pa*(pb/(1-pa+1e-9));
        const ev=p2*o*RTAX;
        const k=Math.max(0,(p2*o-1)/(o-1))*KL;
        bets.push({type:'2連単',label:`${a}-${b_}`,combo:[a,b_],odds:o,ev,kelly:k});
      }
      const perms=[];for(const a of top3)for(const b_ of top3)for(const c of top3)if(new Set([a,b_,c]).size===3)perms.push([a,b_,c]);
      for(const[a,b_,c]of perms){
        const o=parseFloat(r3t[[a,b_,c]]||r3t[`${a},${b_},${c}`]||0);
        if(!o)continue;
        const pa=pm[a],pb=pm[b_],pc=pm[c];
        const p3=pa*(pb/(1-pa+1e-9))*(pc/(1-pa-pb+1e-9));
        const ev=p3*o*RTAX;
        const k=Math.max(0,(p3*o-1)/(o-1))*KL;
        bets.push({type:'3連単',label:`${a}-${b_}-${c}`,combo:[a,b_,c],odds:o,ev,kelly:k});
      }
      bets.sort((a,b)=>b.ev-a.ev);
    }

    const evPlus=bets.filter(b=>b.ev>=MEV);
    if(evPlus.length>0){
      document.getElementById('evrows').innerHTML=evPlus.slice(0,6).map(b=>{
        const amt=Math.max(100,Math.floor(10000*b.kelly/100)*100);
        const ec=b.ev>=1.2?'esp':b.ev>=MEV?'esw':'esn';
        return`<div class="ev-r">
          <div><div class="el">${b.label}</div><div class="et">${b.type}</div></div>
          <div class="eo">${b.odds.toFixed(1)}倍</div>
          <div class="es ${ec}">EV${b.ev.toFixed(2)}</div>
          <div class="ea ${b.ev>=1.2?'':'w'}">${amt.toLocaleString()}円</div>
        </div>`;
      }).join('');
    }else{
      document.getElementById('evrows').innerHTML=`<div style="color:var(--mist);font-size:12px;padding:10px 0;line-height:1.7">${hasOdds?'全買い目のEVがマイナスです。見送りを推奨します。':'オッズ確定後にEVを計算します。'}</div>`;
    }

    // ── タイムライン（差別化の核心） ──
    const now=new Date();
    const timeStr=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const tlItems=[];

    // 前日予想との差分
    if(prevPrediction){
      const prevTop=prevPrediction.top;
      const changed=prevTop!==w;
      tlItems.push({
        time:prevPrediction.time,cls:'sky',
        text:`<b>前回予想</b>：本命${prevTop}号艇 ${prevPrediction.topProb.toFixed(1)}%${changed?`<span class="tl-changed">→ 変更</span>`:''}`,
      });
    }else{
      tlItems.push({time:'前日',cls:'sky',text:'<b>前日予想</b>：出走表データのみで計算（展示・オッズ未反映）'});
    }

    if(hasBefore){
      tlItems.push({time:'展示後',cls:'go',text:`<b>展示情報反映</b>：ST・展示タイムをモデルに組み込み予想を更新。${c1StDis>=0.03?`1号艇のST遅れ（+${c1StDis.toFixed(2)}秒）を検出。`:''}`});
    }else{
      tlItems.push({time:'展示前',cls:'warn',text:'<b>展示情報未取得</b>：発走15〜30分前に再取得してください。展示後に予想が変わる可能性があります。'});
    }

    if(evPlus.length>0){
      tlItems.push({time:timeStr,cls:'go',text:`<b>オッズ反映・EV計算完了</b>：${evPlus.length}件の期待値プラス買い目を検出。最高EV ${evPlus[0].ev.toFixed(2)}（${evPlus[0].label}）`});
    }else if(hasOdds){
      tlItems.push({time:timeStr,cls:'warn',text:'<b>オッズ確定</b>：全買い目のEVがマイナスです。このレースは見送りを推奨します。'});
    }else{
      tlItems.push({time:timeStr,cls:'sky',text:'<b>オッズ未確定</b>：発走30分前から単勝オッズが出ます。確定後にEV計算を実行します。'});
    }

    document.getElementById('tlrows').innerHTML=tlItems.map(t=>`
      <div class="tl-row">
        <div class="tl-time">${t.time}</div>
        <div class="tl-dot ${t.cls}"></div>
        <div class="tl-body">${t.text}</div>
      </div>`).join('');

    // 基本買い目
    const g2=(a,b_)=>parseFloat(r2t[[a,b_]]||r2t[`${a},${b_}`]||0);
    const g3=(a,b_,c)=>parseFloat(r3t[[a,b_,c]]||r3t[`${a},${b_},${c}`]||0);
    const items=[
      {lbl:'3連単',combo:`${w}-${p}-${s}`,odds:g3(w,p,s)},
      {lbl:'3連単',combo:`${w}-${s}-${p}`,odds:g3(w,s,p)},
      {lbl:'2連単',combo:`${w}-${p}`,    odds:g2(w,p)},
      {lbl:'2連単',combo:`${w}-${s}`,    odds:g2(w,s)},
    ];
    document.getElementById('betsg').innerHTML=items.map(it=>{
      const parts=it.combo.split('-').map(Number);
      const tp3=(a,b_,c)=>{const pa=pm[a],pb=pm[b_],pc=pm[c];return pa*(pb/(1-pa+1e-9))*(pc/(1-pa-pb+1e-9))};
      const tp2=(a,b_)=>{const pa=pm[a],pb=pm[b_];return pa*(pb/(1-pa+1e-9))};
      const prob=parts.length===3?tp3(...parts):tp2(...parts);
      const ev_=it.odds>0?prob*it.odds*RTAX:null;
      const ec=ev_?ev_>=MEV?'var(--go)':ev_>=0.8?'var(--warn)':'var(--stop)':'var(--mist)';
      return`<div class="bet-b">
        <div class="btl">${it.lbl}</div>
        <div class="bc">${it.combo}</div>
        <div class="bo">${it.odds>0?it.odds.toFixed(1)+'倍':'オッズ未確定'}</div>
        <div class="be" style="color:${ec}">${ev_?`EV ${ev_.toFixed(2)}`:'EV—'}</div>
      </div>`;
    }).join('');

    prevPrediction={top:w,topProb:topP*100,time:timeStr};
    renderHist();
    document.getElementById('ld').style.display='none';
    document.getElementById('result').style.display='block';
    document.getElementById('bp').classList.add('show');
    document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
  },900);
}

function renderHist(){
  const today=hist.filter(r=>r.date===tod);
  const card=document.getElementById('rh');
  if(!today.length){card.style.display='none';return}
  card.style.display='block';
  const inv=today.reduce((a,r)=>a+r.amount,0);
  const ret=today.reduce((a,r)=>a+r.payout,0);
  const roi=inv>0?(ret/inv*100).toFixed(1)+'%':'—';
  document.getElementById('ti').textContent=inv.toLocaleString();
  document.getElementById('tr').textContent=ret.toLocaleString();
  const re=document.getElementById('troi');re.textContent=roi;re.style.color=ret>=inv?'var(--go)':'var(--stop)';
  document.getElementById('rhrows').innerHTML=today.slice(-6).reverse().map(r=>`
    <div class="hi-r">
      <span>${r.venue}${r.rno}R ${r.label}</span>
      <span class="${r.hit?'hi-hit':'hi-miss'}">${r.hit?'+':'−'}${Math.abs(r.payout-r.amount).toLocaleString()}円 ${r.odds.toFixed(1)}倍</span>
    </div>`).join('');
}

function reset(){
  document.getElementById('result').style.display='none';
  document.getElementById('rcard').classList.remove('show');
  document.getElementById('rc').classList.remove('show');
  document.getElementById('uw').className='upset-who';
  document.getElementById('bp').classList.remove('show');
  boats=[];before={};odds={};
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
</script>
</body>
